<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Hacker 2.0</title>
  <style>
    body { margin:0; background:#050505; display:flex; justify-content:center; align-items:center; height:100vh; font-family:monospace; color:#0f0; overflow: hidden; }
    canvas { border:2px solid #0f0; background:#000; cursor:crosshair; box-shadow: 0 0 20px rgba(0, 255, 0, 0.1); }
    #ui { position:absolute; top:10px; left:10px; font-size:14px; pointer-events: none; }
    #status { position:absolute; bottom:10px; left:10px; font-size:12px; color: #888; }
    #error-log { position:absolute; top:10px; right:10px; width: 300px; color: #f55; font-size: 12px; text-align: right; pointer-events: none;}
  </style>
</head>
<body>
  <div id="ui">HP: <span id="hp">100</span> | SCORE: <span id="score">0</span></div>
  <div id="status">⚪ INIT...</div>
  <div id="error-log"></div>
  <canvas id="game" width="800" height="600"></canvas>
  
    <script type="module">
        // import { renderGame } from './js/render.js';
        import { createRenderer } from '/static/js/render.js';
        import { loadAllConfigs } from '/static/js/config.js';
        const CONFIG = await loadAllConfigs();

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const playerSheet = new Image();
        playerSheet.src = '/static/assets/player_sheet.png';

        const tileSheet = new Image();
        tileSheet.src = '/static/assets/tileset.png';

        const statusEl = document.getElementById('status');

        const params = new URLSearchParams(location.search);
        const spectatorMode = params.get('spectator') === '1';


        
        // Состояние
        let myId = null;
        let state = { players: [], enemies: [], bullets: [], hits: [], explosions: [] };
        let keys = {};
        let mouse = { x: canvas.width/2, y: canvas.height/2, down: false };
        // let shootCooldown = 0; Перенес обработку на сервер
        let lastShotTime = 0;
        let animationTime = 0;
        
        // Настройки эффектов
        // const EFFECTS = {
        //     // Эффекты выстрелов и попаданий
        //     muzzleFlash: { radius: 15, life: 0.08, color: "#ff8" },
        //     // Эффект следа от пули (можно расширить до спрайта дыма)
        //     bulletTrail: { count: 3, life: 0.1 },
        //     // Эффект попадания (можно расширить до анимации взрыва)
        //     hitFlash: { color: "#f44", radius: 20 },
        //     // Эффект взрыва (можно расширить до спрайта взрыва)
        //     explosion: { particles: 12, colors: ["#f84", "#fa2", "#ff6"] }
        // };
        
        // Локальные эффекты (не синхронизируются с сервером)
        let localEffects = [];

        let spritesLoaded = false;

        // const CONFIG.sprites = {

        //     player: {

        //         idle: [
        //             // [32,157,32,32],
        //             // [275,157,32,32],
        //             [42,192,132,132],
        //             [237,192,132,132]
        //         ],

        //         walk: [
        //             [42,432,85,127],
        //             [145,432,85,127],
        //             [245,432,85,127],
        //             [343,432,85,127],
        //             [440,432,85,127],
        //             [530,432,80,127],
        //         ]
        //     },

        //     weapon: {
        //         rifle: [661,244,143,80]
        //     },

        //     muzzle: [
        //         [274,676,74,74],
        //         [363,670,103,67],
        //         [468,661,123,80]
        //     ],

        //     bullet: [671,777,40,20],

        //     hit: [
        //         [650, 860, 90, 90],
        //         [760, 850, 120, 120],
        //         [870, 840, 150, 150]
        //     ]
        // };
        
        const game = {
            ctx,
            canvas,
            state,
            myId,
            spritesLoaded,
            playerSheet,
            // SPRITES,
            tileSheet, // Спрайты для тайлов
            // EFFECTS,
            CONFIG,
            localEffects,
            spectatorMode,
            animationTime: 0,

            camera: {
                x: 0,
                y: 0
            },
            me() {
                return this.state.players?.find(
                    p => p.id === this.myId
                );
            }
        };


        playerSheet.onload = () => {
            console.log("✅ sprites loaded");
            game.spritesLoaded = true;
        };

        playerSheet.onerror = () => {
            console.error("❌ sprite load failed");
        };


        // WebSocket
        let ws;
        function connect() {
            statusEl.textContent = "🔄 Connecting...";
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            // ws = new WebSocket(`${protocol}//${location.host}/ws`);
            const endpoint = spectatorMode ? '/justlook' : '/ws';
            ws = new WebSocket(`${protocol}//${location.host}${endpoint}`);
            
            ws.onopen = () => {
                statusEl.textContent = "🟢 ONLINE";
                statusEl.style.color = "#0f0";
            };
            ws.onclose = () => {
                statusEl.textContent = "🔴 OFFLINE";
                statusEl.style.color = "#f55";
                setTimeout(connect, 2000);
            };
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);

                    if(data.type === 'welcome') {
                        game.myId = data.player_id;
                        return;
                    }

                    game.state = data;

                } catch(err) {
                    console.error("Parse error:", err);
                }
            };
        }

        // Управление
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        canvas.addEventListener('mousemove', e => {
            const r = canvas.getBoundingClientRect();
            mouse.x = e.clientX - r.left;
            mouse.y = e.clientY - r.top;
        });
        canvas.addEventListener('mousedown', () => mouse.down = true);
        canvas.addEventListener('mouseup', () => mouse.down = false);
        
        // Отправка ввода
        function sendInput() {
            if(!ws || ws.readyState !== WebSocket.OPEN) return;
            if(game.spectatorMode) return;
            
            let dx = 0, dy = 0;
            if(keys['KeyW']||keys['ArrowUp']) dy = -1;
            if(keys['KeyS']||keys['ArrowDown']) dy = 1;
            if(keys['KeyA']||keys['ArrowLeft']) dx = -1;
            if(keys['KeyD']||keys['ArrowRight']) dx = 1;
            
            let angle = 0;
            const worldMouseX =
                mouse.x + game.camera.x;
                const worldMouseY =
                mouse.y + game.camera.y;
            if(game.me()) {
                const p = game.me();
                angle = Math.atan2(worldMouseY - p.y, worldMouseX - p.x);
            }
            
            const canShoot = mouse.down; // && shootCooldown <= 0;
            if(canShoot) {
                //shootCooldown = 10; // ~6 выстрелов/сек
                // Локальный эффект выстрела (мгновенный, без задержки сети)
                if(game.me()) {
                    const p = game.me();
                    game.localEffects.push({
                        type: 'muzzle',
                        x: p.x + Math.cos(angle)*15,
                        y: p.y + Math.sin(angle)*15,
                        life: game.CONFIG.effects.muzzleFlash.life,
                        angle: angle
                    });
                }
            }
            //shootCooldown = Math.max(0, shootCooldown - 1);
            
            ws.send(JSON.stringify({ dx, dy, shoot: canShoot, angle }));
        }
               
        // Старт
        console.log("🎮 Client started");

        connect();

        // отдельный network loop
        setInterval(sendInput, 1000 / 60);
        
        // // === РЕНДЕР ===
        const renderer = createRenderer(game);
        renderer.render();
    </script>
</body>
</html>
